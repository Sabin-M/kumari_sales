<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create an account</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #6ee974;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: #fff;
        width: 320px;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 92%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #4CAF50;
        border: none;
        font-size: 15px;
        color: white;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background: #45a0a0;
    }

    .error {
        color: red;
        font-size: 13px;
    }
    label {
    display: block;
    font-size: 14px;
    margin-bottom: 5px;
    font-weight: bold;
}

</style>
</head>
<body>

<div class="container">
    <h2>CREATE AN ACCOUNT</h2>

    <form method="POST">
    {% csrf_token %}

    {{ form.non_field_errors }}

    <label>{{ form.name.label }}</label>
    {{ form.name }}
    <div class="error">{{ form.name.errors }}</div>

    <label>{{ form.email.label }}</label>
    {{ form.email }}
    <div class="error">{{ form.email.errors }}</div>

    <label>{{ form.password.label }}</label>
    {{ form.password }}
    <div class="error">{{ form.password.errors }}</div>

    <label>{{ form.confirm_password.label }}</label>
    {{ form.confirm_password }}
    <div class="error">{{ form.confirm_password.errors }}</div>

    <button type="submit">Signup</button>
</form>

    <p style="margin-top:15px;">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>

</div>

</body>
</html>
