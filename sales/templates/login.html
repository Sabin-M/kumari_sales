<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #7CBC57;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 360px;
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 6px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-container h1 {
            margin-bottom: 30px;
        }

        .login-container input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            background: #f2f2f2;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .login-container input:focus {
            background: #e6e6e6;
        }

        .error {
            color: red;
            font-size: 13px;
            text-align: left;
            margin-bottom: 10px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            background: #45a049;
            transform: scale(1.02);
        }

        .register-text {
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }

        .register-text a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }

        .register-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-container">

    <h1>Login</h1>

    <form method="POST">
        {% csrf_token %}

        {{ form.email }}
        <div class="error">{{ form.email.errors }}</div>

        {{ form.password }}
        <div class="error">{{ form.password.errors }}</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <button type="submit" class="login-btn">
            LOGIN
        </button>
    </form>

    <p class="register-text">
        Not registered?
        <a href="{% url 'signup' %}">Create an account</a>
    </p>

</div>

</body>
</html>
