{% load static %}

<!DOCTYPE html>

<html>
<head>
<title>Track Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
}

.track-card{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 4px 25px rgba(0,0,0,0.1);
}

.step{
text-align:center;
flex:1;
}

.step-circle{
width:40px;
height:40px;
border-radius:50%;
background:#dee2e6;
color:white;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-weight:bold;
}

.step.active .step-circle{
background:#28a745;
}

.step-line{
height:4px;
background:#dee2e6;
flex:1;
margin-top:18px;
}

.step-line.active{
background:#28a745;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="track-card">

<h2 class="text-center mb-4">Track Order</h2>

<div class="text-center mb-4">
<p><strong>Order ID :</strong> {{ order.id }}</p>
<p><strong>Status :</strong> {{ order.status|title }}</p>
</div>

<!-- TRACKING STEPS -->

<div class="d-flex align-items-center justify-content-between">

<div class="step {% if order.status == 'pending' or order.status == 'packed' or order.status == 'shipped' or order.status == 'delivered' %}active{% endif %}">
<div class="step-circle">1</div>
<p class="mt-2">Order Received</p>
</div>

<div class="step-line {% if order.status == 'packed' or order.status == 'shipped' or order.status == 'delivered' %}active{% endif %}"></div>

<div class="step {% if order.status == 'packed' or order.status == 'shipped' or order.status == 'delivered' %}active{% endif %}">
<div class="step-circle">2</div>
<p class="mt-2">Packed</p>
</div>

<div class="step-line {% if order.status == 'shipped' or order.status == 'delivered' %}active{% endif %}"></div>

<div class="step {% if order.status == 'shipped' or order.status == 'delivered' %}active{% endif %}">
<div class="step-circle">3</div>
<p class="mt-2">Shipped</p>
</div>

<div class="step-line {% if order.status == 'delivered' %}active{% endif %}"></div>

<div class="step {% if order.status == 'delivered' %}active{% endif %}">
<div class="step-circle">4</div>
<p class="mt-2">Delivered</p>
</div>

</div>

<hr class="my-4">

<div class="text-center">

<a href="{% url 'home' %}" class="btn btn-primary">
Continue Shopping
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
